services:

  postgres:
    image: postgres:16-alpine
    container_name: cspm_postgres_prod
    hostname: cspm-db
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cspm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./CSPM-Tool
      dockerfile: Dockerfile
    container_name: cspm_backend_prod
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cspm-db:5432/${POSTGRES_DB}
    networks:
      - cspm_net
    depends_on:
      postgres:
        condition: service_healthy
    # No --reload in production
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    build:
      context: ./CSPM-Dashboard
      dockerfile: Dockerfile.prod
    container_name: cspm_frontend_prod
    restart: always
    networks:
      - cspm_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: cspm_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cspm_net
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:

networks:
  cspm_net:
    driver: bridge
