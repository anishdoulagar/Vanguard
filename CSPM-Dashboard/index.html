<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANGUARD // CSPM</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* ── Surfaces — Apple Black ── */
        --bg:       #000000;
        --surface:  #111111;
        --card:     #1c1c1e;
        --border:   rgba(255,255,255,0.08);

        /* ── Text ── */
        --accent:   #ffffff;
        --accent2:  rgba(255,255,255,0.6);
        --accent3:  rgba(255,255,255,0.3);

        /* ── Single accent — Apple Blue ── */
        --cyan:     #0071e3;

        /* ── Severity / data colors — Apple system palette ── */
        --green:    #34c759;
        --red:      #ff3b30;
        --orange:   #ff9500;
        --yellow:   #ffd60a;
        --blue:     #0071e3;
        --magenta:  #bf5af2;
        --purple:   #bf5af2;

        /* ── Shadows ── */
        --glow-cyan:    rgba(0,113,227,0.22) 3px 5px 30px 0px;
        --glow-magenta: 0 4px 16px rgba(191,90,242,0.12);
        --glow-green:   0 4px 16px rgba(52,199,89,0.15);
        --glow-red:     0 4px 16px rgba(255,59,48,0.15);

        /* ── Fonts — SF Pro via system ── */
        --font-display: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-ui:      -apple-system, "SF Pro Text",    "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-mono:    "SF Mono", "JetBrains Mono", "Fira Code", monospace;

        /* ── Component tokens ── */
        --sidebar-border:    rgba(255,255,255,0.06);
        --nav-divider:       rgba(255,255,255,0.05);
        --nav-active-bg:     rgba(0,113,227,0.12);
        --nav-active-glow:   transparent;
        --admin-active-bg:   rgba(0,113,227,0.12);
        --admin-active-glow: transparent;
        --bottom-divider:    rgba(255,255,255,0.06);
        --role-admin-bg:     rgba(0,113,227,0.10);
        --role-admin-border: rgba(0,113,227,0.30);
        --role-super-bg:     rgba(191,90,242,0.10);
        --role-super-border: rgba(191,90,242,0.30);

        /* ── Radius ── */
        --radius:    8px;
        --radius-lg: 12px;
      }

      html, body, #root {
        height: 100%;
        background: var(--bg);
        color: var(--accent);
      }

      body {
        font-family: var(--font-ui);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

      input, select, button, textarea { font-family: inherit; }
      input::placeholder, textarea::placeholder { color: var(--accent3); }

      input:focus, select:focus, textarea:focus {
        outline: none !important;
        border-color: var(--cyan) !important;
        box-shadow: 0 0 0 3px rgba(0,113,227,0.25) !important;
      }

      /* ── Animations ── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.96) translateY(4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes overlayIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes scanLine {
        0%   { top: -2px;   opacity: 0; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { top: 100vh;  opacity: 0; }
      }

      /* Reduced motion: keep fades, skip transforms */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.15s !important;
          transition-duration: 0.15s !important;
        }
        @keyframes modalIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        @keyframes slideUp {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
      }

      /* ── Button styles — Apple ── */
      .btn-primary {
        position: relative;
        background: #0071e3;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 8px 15px;
        font-weight: 400;
        letter-spacing: -0.374px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-primary:hover  { background: #0077ed; }
      .btn-primary:active { background: #006edb; transform: scale(0.98); }

      .btn-ghost {
        position: relative;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--accent2);
        border-radius: 8px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-ghost:hover {
        border-color: #0071e3;
        color: #0071e3;
        background: rgba(0,113,227,0.05);
      }

      .btn-danger {
        background: transparent;
        border: 1px solid rgba(255,59,48,0.3);
        color: var(--red);
        border-radius: 8px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-danger:hover {
        background: rgba(255,59,48,0.08);
        border-color: var(--red);
      }

      /* Legacy compat: neon-btn maps to btn-ghost */
      .neon-btn {
        position: relative;
        overflow: hidden;
        transition: all 0.15s;
      }
      .neon-btn:hover {
        border-color: var(--cyan) !important;
        color: var(--cyan) !important;
        box-shadow: rgba(0,113,227,0.22) 3px 5px 30px 0px;
      }

      /* Legacy compat: neon-card maps to clean card */
      .neon-card {
        position: relative;
      }

      /* ── Sidebar nav ── */
      .nav-btn {
        position: relative;
        overflow: hidden;
        transition: background 0.15s, color 0.15s;
        border-radius: 6px;
        margin: 0 8px;
        width: calc(100% - 16px) !important;
      }
      @media (hover: hover) and (pointer: fine) {
        .nav-btn:hover {
          background: rgba(255,255,255,0.04) !important;
        }
      }
      .nav-btn.active {
        background: var(--nav-active-bg) !important;
      }
      .nav-btn.active::before {
        content: '';
        position: absolute;
        left: 0; top: 50%;
        transform: translateY(-50%);
        width: 3px; height: 60%;
        background: var(--cyan);
        border-radius: 0 2px 2px 0;
      }

      /* ── Pulse dot ── */
      .pulse-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--green);
      }

      /* ═══ Light mode — Apple ═══ */
      [data-theme="light"] {
        --bg:       #f5f5f7;
        --surface:  #f5f5f7;
        --card:     #ffffff;
        --border:   rgba(0,0,0,0.08);

        --accent:   #1d1d1f;
        --accent2:  rgba(0,0,0,0.6);
        --accent3:  rgba(0,0,0,0.48);

        --cyan:     #0071e3;
        --green:    #1c7c4a;
        --red:      #d70015;
        --orange:   #c05c00;
        --yellow:   #a67c00;
        --blue:     #0071e3;
        --magenta:  #8e3ac5;
        --purple:   #8e3ac5;

        --glow-cyan:    rgba(0,113,227,0.12) 3px 5px 30px 0px;
        --glow-magenta: 0 4px 16px rgba(142,58,197,0.12);
        --glow-green:   0 4px 16px rgba(28,124,74,0.12);
        --glow-red:     0 4px 16px rgba(215,0,21,0.12);

        --sidebar-border:    rgba(0,0,0,0.08);
        --nav-divider:       rgba(0,0,0,0.06);
        --nav-active-bg:     rgba(0,113,227,0.08);
        --admin-active-bg:   rgba(0,113,227,0.08);
        --bottom-divider:    rgba(0,0,0,0.06);
        --role-admin-bg:     rgba(0,113,227,0.08);
        --role-admin-border: rgba(0,113,227,0.25);
        --role-super-bg:     rgba(142,58,197,0.08);
        --role-super-border: rgba(142,58,197,0.25);
      }

      [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
      [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

      /* ── Light mode glass navbar ── */
      [data-theme="light"] header {
        background: rgba(245,245,247,0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
