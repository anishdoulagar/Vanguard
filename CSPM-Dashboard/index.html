<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANGUARD // CSPM</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* ── Surfaces — Airtable Light ── */
        --bg:       #f8fafc;
        --surface:  #f1f4f9;
        --card:     #ffffff;
        --border:   #e0e2e6;

        /* ── Text — Deep Navy ── */
        --accent:   #181d26;
        --accent2:  rgba(4,14,32,0.69);
        --accent3:  rgba(4,14,32,0.42);

        /* ── Single accent — Airtable Blue ── */
        --cyan:     #1b61c9;

        /* ── Severity / data colors ── */
        --green:    #16a34a;
        --red:      #dc2626;
        --orange:   #ea580c;
        --yellow:   #ca8a04;
        --blue:     #1b61c9;
        --magenta:  #7c3aed;
        --purple:   #7c3aed;

        /* ── Shadows — Airtable blue-tinted ── */
        --shadow-card:    rgba(0,0,0,0.32) 0px 0px 1px, rgba(0,0,0,0.08) 0px 0px 2px, rgba(45,127,249,0.28) 0px 1px 3px, rgba(0,0,0,0.06) 0px 0px 0px 0.5px inset;
        --shadow-soft:    rgba(15,48,106,0.05) 0px 0px 20px;
        --glow-cyan:      rgba(27,97,201,0.18) 0px 4px 16px;
        --glow-magenta:   0 4px 16px rgba(124,58,237,0.14);
        --glow-green:     0 4px 16px rgba(22,163,74,0.14);
        --glow-red:       0 4px 16px rgba(220,38,38,0.14);

        /* ── Fonts — Haas via system ── */
        --font-display: -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-ui:      -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-mono:    "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;

        /* ── Component tokens ── */
        --sidebar-border:    #e0e2e6;
        --nav-divider:       #e0e2e6;
        --nav-active-bg:     rgba(27,97,201,0.08);
        --nav-active-glow:   transparent;
        --admin-active-bg:   rgba(27,97,201,0.08);
        --admin-active-glow: transparent;
        --bottom-divider:    #e0e2e6;
        --role-admin-bg:     rgba(27,97,201,0.08);
        --role-admin-border: rgba(27,97,201,0.28);
        --role-super-bg:     rgba(124,58,237,0.08);
        --role-super-border: rgba(124,58,237,0.28);

        /* ── Radius ── */
        --radius:    12px;
        --radius-lg: 16px;
      }

      html, body, #root {
        height: 100%;
        background: var(--bg);
        color: var(--accent);
      }

      body {
        font-family: var(--font-ui);
        font-size: 14px;
        letter-spacing: 0.08px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(24,29,38,0.14); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(24,29,38,0.24); }

      input, select, button, textarea { font-family: inherit; }
      input::placeholder, textarea::placeholder { color: var(--accent3); }

      input:focus, select:focus, textarea:focus {
        outline: none !important;
        border-color: var(--cyan) !important;
        box-shadow: 0 0 0 3px rgba(27,97,201,0.18) !important;
      }

      /* ── Animations ── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.97) translateY(4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes overlayIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes scanLine {
        0%   { top: -2px;   opacity: 0; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { top: 100vh;  opacity: 0; }
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.15s !important;
          transition-duration: 0.15s !important;
        }
        @keyframes modalIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
      }

      /* ── Button styles — Airtable ── */
      .btn-primary {
        position: relative;
        background: #1b61c9;
        color: #ffffff;
        border: none;
        border-radius: 12px;
        padding: 8px 16px;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.08px;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
        box-shadow: rgba(0,0,0,0.32) 0px 0px 1px, rgba(45,127,249,0.28) 0px 1px 3px;
      }
      .btn-primary:hover  { background: #254fad; box-shadow: rgba(0,0,0,0.32) 0px 0px 1px, rgba(45,127,249,0.4) 0px 2px 6px; }
      .btn-primary:active { background: #1a55b8; transform: scale(0.98); }

      .btn-ghost {
        position: relative;
        background: #ffffff;
        border: 1px solid var(--border);
        color: var(--accent2);
        border-radius: 12px;
        font-weight: 500;
        letter-spacing: 0.08px;
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: rgba(0,0,0,0.32) 0px 0px 1px, rgba(0,0,0,0.06) 0px 1px 2px;
      }
      .btn-ghost:hover {
        border-color: #1b61c9;
        color: #1b61c9;
        background: rgba(27,97,201,0.04);
      }

      .btn-danger {
        background: transparent;
        border: 1px solid rgba(220,38,38,0.28);
        color: var(--red);
        border-radius: 12px;
        font-weight: 500;
        letter-spacing: 0.08px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-danger:hover {
        background: rgba(220,38,38,0.06);
        border-color: var(--red);
      }

      /* Legacy compat */
      .neon-btn {
        position: relative;
        overflow: hidden;
        transition: all 0.15s;
      }
      .neon-btn:hover {
        border-color: var(--cyan) !important;
        color: var(--cyan) !important;
        box-shadow: var(--glow-cyan);
      }

      .neon-card { position: relative; }

      /* ── Sidebar nav ── */
      .nav-btn {
        position: relative;
        overflow: hidden;
        transition: background 0.15s, color 0.15s;
        border-radius: 8px;
        margin: 0 8px;
        width: calc(100% - 16px) !important;
      }
      @media (hover: hover) and (pointer: fine) {
        .nav-btn:hover {
          background: rgba(27,97,201,0.06) !important;
        }
      }
      .nav-btn.active {
        background: var(--nav-active-bg) !important;
      }
      .nav-btn.active::before {
        content: '';
        position: absolute;
        left: 0; top: 50%;
        transform: translateY(-50%);
        width: 3px; height: 60%;
        background: var(--cyan);
        border-radius: 0 2px 2px 0;
      }

      /* ── Pulse dot ── */
      .pulse-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--green);
      }

      /* ═══ Dark mode — Deep Navy ═══ */
      [data-theme="dark"] {
        --bg:       #0f1117;
        --surface:  #171c28;
        --card:     #1e2532;
        --border:   rgba(255,255,255,0.09);

        --accent:   #f0f4ff;
        --accent2:  rgba(240,244,255,0.65);
        --accent3:  rgba(240,244,255,0.38);

        --cyan:     #4f8ef7;
        --green:    #34d399;
        --red:      #f87171;
        --orange:   #fb923c;
        --yellow:   #fbbf24;
        --blue:     #4f8ef7;
        --magenta:  #a78bfa;
        --purple:   #a78bfa;

        --shadow-card:    rgba(0,0,0,0.6) 0px 0px 1px, rgba(0,0,0,0.3) 0px 4px 16px;
        --shadow-soft:    rgba(0,0,0,0.3) 0px 0px 20px;
        --glow-cyan:      rgba(79,142,247,0.18) 0px 4px 16px;

        --sidebar-border:    rgba(255,255,255,0.07);
        --nav-divider:       rgba(255,255,255,0.07);
        --nav-active-bg:     rgba(79,142,247,0.12);
        --admin-active-bg:   rgba(79,142,247,0.12);
        --bottom-divider:    rgba(255,255,255,0.07);
        --role-admin-bg:     rgba(79,142,247,0.10);
        --role-admin-border: rgba(79,142,247,0.30);
        --role-super-bg:     rgba(167,139,250,0.10);
        --role-super-border: rgba(167,139,250,0.30);
      }

      [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
      [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

      [data-theme="dark"] .btn-ghost {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.09);
        box-shadow: none;
      }
      [data-theme="dark"] .btn-ghost:hover {
        background: rgba(79,142,247,0.1);
        border-color: #4f8ef7;
        color: #4f8ef7;
      }

      /* ── Dark navbar ── */
      [data-theme="dark"] header {
        background: rgba(15,17,23,0.92) !important;
        border-bottom: 1px solid rgba(255,255,255,0.07) !important;
        backdrop-filter: saturate(180%) blur(20px) !important;
        -webkit-backdrop-filter: saturate(180%) blur(20px) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
