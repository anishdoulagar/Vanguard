<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANGUARD // CSPM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* ── Surfaces — Ember ── */
        --bg:       #0e0c09;
        --surface:  #131009;
        --card:     #18140c;
        --border:   #2a2318;

        /* ── Text ── */
        --accent:   #d4c0a0;
        --accent2:  #7a6b52;
        --accent3:  #4a3f2a;

        /* ── Colors ── */
        --cyan:     #f5a623;
        --magenta:  #c084fc;
        --green:    #4dc882;
        --yellow:   #f5a623;
        --red:      #e05555;
        --orange:   #f5782a;
        --blue:     #60a5fa;
        --purple:   #c084fc;

        /* ── Glows — very subtle ── */
        --glow-cyan:    0 4px 16px rgba(245,166,35,0.18);
        --glow-magenta: 0 4px 16px rgba(192,132,252,0.15);
        --glow-green:   0 4px 16px rgba(77,200,130,0.15);
        --glow-red:     0 4px 16px rgba(224,85,85,0.15);

        /* ── Fonts ── */
        --font-display: 'Inter', system-ui, -apple-system, sans-serif;
        --font-ui:      'Inter', system-ui, -apple-system, sans-serif;
        --font-mono:    'JetBrains Mono', 'Fira Code', monospace;

        /* ── Component tokens ── */
        --sidebar-border:    rgba(255,200,80,0.07);
        --nav-divider:       rgba(255,200,80,0.05);
        --nav-active-bg:     rgba(245,166,35,0.10);
        --nav-active-glow:   transparent;
        --admin-active-bg:   rgba(192,132,252,0.10);
        --admin-active-glow: transparent;
        --bottom-divider:    rgba(255,200,80,0.07);
        --role-admin-bg:     rgba(245,166,35,0.10);
        --role-admin-border: rgba(245,166,35,0.30);
        --role-super-bg:     rgba(192,132,252,0.10);
        --role-super-border: rgba(192,132,252,0.30);

        /* ── Radius ── */
        --radius:   8px;
        --radius-lg: 12px;
      }

      html, body, #root {
        height: 100%;
        background: var(--bg);
        color: var(--accent);
      }

      body {
        font-family: var(--font-ui);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

      input, select, button, textarea { font-family: inherit; }
      input::placeholder, textarea::placeholder { color: var(--accent3); }

      input:focus, select:focus, textarea:focus {
        outline: none !important;
        border-color: var(--cyan) !important;
        box-shadow: 0 0 0 3px rgba(245,166,35,0.12) !important;
      }

      /* ── Animations ── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.96) translateY(4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes overlayIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* Reduced motion: keep fades, skip transforms */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.15s !important;
          transition-duration: 0.15s !important;
        }
        @keyframes modalIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        @keyframes slideUp {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
      }

      /* ── Button styles ── */
      .btn-primary {
        position: relative;
        background: var(--cyan);
        color: #0e0c09;
        border: none;
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: var(--glow-cyan);
      }
      .btn-primary:active { transform: scale(0.98); }

      .btn-ghost {
        position: relative;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--accent2);
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-ghost:hover {
        border-color: var(--cyan);
        color: var(--cyan);
        background: rgba(245,166,35,0.05);
      }

      .btn-danger {
        background: transparent;
        border: 1px solid rgba(239,68,68,0.3);
        color: var(--red);
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-danger:hover {
        background: rgba(239,68,68,0.08);
        border-color: var(--red);
      }

      /* Legacy compat: neon-btn maps to btn-ghost */
      .neon-btn {
        position: relative;
        overflow: hidden;
        transition: all 0.15s;
      }
      .neon-btn:hover {
        border-color: var(--cyan) !important;
        color: var(--cyan) !important;
        box-shadow: var(--glow-cyan);
      }

      /* Legacy compat: neon-card maps to clean card */
      .neon-card {
        position: relative;
      }

      /* ── Sidebar nav ── */
      .nav-btn {
        position: relative;
        overflow: hidden;
        transition: background 0.15s, color 0.15s;
        border-radius: 6px;
        margin: 0 8px;
        width: calc(100% - 16px) !important;
      }
      @media (hover: hover) and (pointer: fine) {
        .nav-btn:hover {
          background: rgba(255,255,255,0.04) !important;
        }
      }
      .nav-btn.active {
        background: var(--nav-active-bg) !important;
      }
      .nav-btn.active::before {
        content: '';
        position: absolute;
        left: 0; top: 50%;
        transform: translateY(-50%);
        width: 3px; height: 60%;
        background: var(--cyan);
        border-radius: 0 2px 2px 0;
      }

      /* ── Pulse dot ── */
      .pulse-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--green);
      }

      /* ═══ Light mode ═══ */
      [data-theme="light"] {
        --bg:       #f0f2f7;
        --surface:  #e4e7ef;
        --card:     #ffffff;
        --border:   #d0d5e0;

        --accent:   #0f172a;
        --accent2:  #334155;
        --accent3:  #64748b;

        --cyan:     #2563eb;
        --green:    #059669;
        --red:      #dc2626;
        --orange:   #d97706;
        --blue:     #2563eb;
        --purple:   #7c3aed;
        --magenta:  #be185d;
        --yellow:   #ca8a04;

        --glow-cyan:    0 4px 16px rgba(37,99,235,0.12);
        --glow-magenta: 0 4px 16px rgba(190,24,93,0.12);
        --glow-green:   0 4px 16px rgba(5,150,105,0.12);
        --glow-red:     0 4px 16px rgba(220,38,38,0.12);

        --sidebar-border:    rgba(0,0,0,0.08);
        --nav-divider:       rgba(0,0,0,0.06);
        --nav-active-bg:     rgba(37,99,235,0.08);
        --admin-active-bg:   rgba(190,24,93,0.08);
        --bottom-divider:    rgba(0,0,0,0.06);
        --role-admin-bg:     rgba(37,99,235,0.08);
        --role-admin-border: rgba(37,99,235,0.25);
        --role-super-bg:     rgba(190,24,93,0.08);
        --role-super-border: rgba(190,24,93,0.25);
      }

      [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
      [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
